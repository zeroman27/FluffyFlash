name: Guardrails

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  forbid-private-paths:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Block private/sensitive tracked paths
        run: |
          set -euo pipefail
          forbidden=(
            '^ObsidianVault/'
            '^FluffyFlash/ReleaseArtifacts/'
            '^FluffyFlash/.*/Tools/bin/'
            '^FluffyFlash/.*/Tools/lib/'
            '^FluffyFlash/EmbeddedCLI/lib/'
            '^FluffyFlash/.*\.xcodeproj/xcuserdata/'
          )

          failed=0
          for pat in "${forbidden[@]}"; do
            if git ls-files | grep -E "$pat" >/dev/null 2>&1; then
              echo "Found forbidden tracked paths matching: $pat"
              git ls-files | grep -E "$pat" | head -n 50
              failed=1
            fi
          done

          if [[ "$failed" -ne 0 ]]; then
            echo ""
            echo "These paths must NOT be tracked in the public repo."
            echo "Move them to the private repo or remove from git history."
            exit 1
          fi

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # gitleaks-action can pass a git log range that uses ROOT^ (invalid on repos whose
      # first commit has no parent). Run the CLI directly so the full history scan works.
      - name: Install Gitleaks
        run: |
          set -euo pipefail
          GITLEAKS_VERSION=8.24.3
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz -C /tmp
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Gitleaks scan
        run: gitleaks detect --verbose --redact --exit-code 1

